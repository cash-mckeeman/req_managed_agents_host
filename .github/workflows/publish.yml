name: Publish to Hex

# Tag-triggered release: push a `v*` tag matching @version in mix.exs.
# Requires the HEX_API_KEY secret (a write key scoped to the package) in the
# `prod` environment. The suite is credential-free, so no other secrets.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # HEX_API_KEY lives in the `prod` environment — jobs only see environment
    # secrets when they declare the environment.
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - run: mix deps.get
      - run: mix test
        env:
          MIX_ENV: test
      - name: Publish
        # No MIX_ENV override: hex.publish builds docs, and ex_doc is
        # `only: :dev` — the docs task doesn't exist outside dev.
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
