name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  test:
    name: test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor claimed by mix.exs (`elixir: "~> 1.16"`).
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.18"
            otp: "27"
          # Edge: matches local development (1.20.x / OTP 29). The
          # warnings-as-errors compile runs only here — older compilers emit
          # warnings that can't be fixed without dropping the floor.
          - elixir: "1.20"
            otp: "29"
            lint: true
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-
      - run: mix deps.get
      - run: mix deps.unlock --check-unused
      - run: mix compile --warnings-as-errors
        if: ${{ matrix.lint }}
      # The suite uses an in-process StubProvider — no Anthropic/AWS
      # credentials are ever required.
      - run: mix test

  quality:
    name: quality (format, credo, docs, package)
    runs-on: ubuntu-latest
    env:
      # Override the workflow-wide :test env — ex_doc is `only: :dev`, so
      # `mix docs` doesn't exist under MIX_ENV=test.
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-quality-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-quality-${{ runner.os }}-
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix hex.audit
      # Broken hexdocs references fail the build here, not after publish.
      - run: mix docs --warnings-as-errors
      # The published tarball must always assemble.
      - run: mix hex.build

  dialyzer:
    name: dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-dialyzer-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-dialyzer-${{ runner.os }}-
      # PLTs are cached separately from deps: they change on BEAM upgrades,
      # not on every mix.lock bump.
      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-29-1.20-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-29-1.20-
      - run: mix deps.get
      - run: mix dialyzer --format github
